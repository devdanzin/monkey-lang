<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractal Explorer — Henry</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #ccc; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; }
  canvas { cursor: crosshair; }
  .controls { display: flex; gap: 0.4rem; padding: 0.4rem; flex-wrap: wrap; justify-content: center; align-items: center; }
  button, select { background: #222; color: #ccc; border: 1px solid #444; padding: 0.2rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
  button:hover, select:hover { border-color: #58a6ff; }
  .info { font-size: 0.6rem; color: #555; padding: 0.2rem; text-align: center; }
  .info a { color: #58a6ff; text-decoration: none; }
  label { font-size: 0.65rem; color: #888; }
  input[type=range] { width: 50px; }
  #coords { font-family: monospace; font-size: 0.6rem; color: #666; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="controls">
  <select id="fractal">
    <option value="mandelbrot">🌀 Mandelbrot</option>
    <option value="julia">💎 Julia Set</option>
    <option value="burning">🔥 Burning Ship</option>
    <option value="tricorn">🔱 Tricorn</option>
  </select>
  <select id="colorScheme">
    <option value="fire">🔥 Fire</option>
    <option value="ocean">🌊 Ocean</option>
    <option value="neon">💜 Neon</option>
    <option value="grayscale">⬛ Grayscale</option>
    <option value="psychedelic">🌈 Psychedelic</option>
  </select>
  <label>Iterations</label>
  <input type="range" id="maxIter" min="50" max="500" value="150">
  <button onclick="resetView()">🏠 Reset</button>
  <button onclick="saveImage()">💾 Save</button>
</div>
<p id="coords">Click to zoom in, right-click to zoom out</p>
<p class="info"><a href="https://github.com/henry-the-frog">Henry</a></p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let width, height;
let centerX = -0.5, centerY = 0, zoom = 200;
let juliaC = { x: -0.7, y: 0.27015 };

function resize() {
  width = Math.min(800, window.innerWidth);
  height = Math.min(600, window.innerHeight - 70);
  canvas.width = width;
  canvas.height = height;
  render();
}

function getMaxIter() { return parseInt(document.getElementById('maxIter').value); }

function mandelbrot(px, py) {
  const x0 = (px - width/2) / zoom + centerX;
  const y0 = (py - height/2) / zoom + centerY;
  let x = 0, y = 0, iter = 0;
  const max = getMaxIter();
  while (x*x + y*y <= 4 && iter < max) {
    const xn = x*x - y*y + x0;
    y = 2*x*y + y0;
    x = xn;
    iter++;
  }
  if (iter === max) return -1;
  // Smooth coloring
  const log_zn = Math.log(x*x + y*y) / 2;
  const nu = Math.log(log_zn / Math.log(2)) / Math.log(2);
  return iter + 1 - nu;
}

function julia(px, py) {
  let x = (px - width/2) / zoom + centerX;
  let y = (py - height/2) / zoom + centerY;
  let iter = 0;
  const max = getMaxIter();
  while (x*x + y*y <= 4 && iter < max) {
    const xn = x*x - y*y + juliaC.x;
    y = 2*x*y + juliaC.y;
    x = xn;
    iter++;
  }
  if (iter === max) return -1;
  const log_zn = Math.log(x*x + y*y) / 2;
  const nu = Math.log(log_zn / Math.log(2)) / Math.log(2);
  return iter + 1 - nu;
}

function burningShip(px, py) {
  const x0 = (px - width/2) / zoom + centerX;
  const y0 = (py - height/2) / zoom + centerY;
  let x = 0, y = 0, iter = 0;
  const max = getMaxIter();
  while (x*x + y*y <= 4 && iter < max) {
    const xn = x*x - y*y + x0;
    y = Math.abs(2*x*y) + y0;
    x = Math.abs(xn);
    iter++;
  }
  if (iter === max) return -1;
  return iter;
}

function tricorn(px, py) {
  const x0 = (px - width/2) / zoom + centerX;
  const y0 = (py - height/2) / zoom + centerY;
  let x = 0, y = 0, iter = 0;
  const max = getMaxIter();
  while (x*x + y*y <= 4 && iter < max) {
    const xn = x*x - y*y + x0;
    y = -2*x*y + y0;
    x = xn;
    iter++;
  }
  if (iter === max) return -1;
  return iter;
}

const fractalFns = { mandelbrot, julia, burning: burningShip, tricorn };

function colorFire(t) {
  const r = Math.min(255, t * 12);
  const g = Math.min(255, Math.max(0, t * 4 - 128));
  const b = Math.min(255, Math.max(0, t * 2 - 200));
  return [r, g, b];
}

function colorOcean(t) {
  const r = Math.min(255, Math.max(0, t * 2 - 100));
  const g = Math.min(255, t * 4);
  const b = Math.min(255, 50 + t * 8);
  return [r, g, b];
}

function colorNeon(t) {
  const r = Math.floor(128 + 127 * Math.sin(t * 0.05));
  const g = Math.floor(128 + 127 * Math.sin(t * 0.05 + 2));
  const b = Math.floor(128 + 127 * Math.sin(t * 0.05 + 4));
  return [r, g, b];
}

function colorGrayscale(t) {
  const v = Math.min(255, t * 5);
  return [v, v, v];
}

function colorPsychedelic(t) {
  const r = Math.floor(128 + 127 * Math.sin(t * 0.1));
  const g = Math.floor(128 + 127 * Math.sin(t * 0.13 + 1));
  const b = Math.floor(128 + 127 * Math.sin(t * 0.17 + 2));
  return [r, g, b];
}

const colorFns = { fire: colorFire, ocean: colorOcean, neon: colorNeon, grayscale: colorGrayscale, psychedelic: colorPsychedelic };

function render() {
  const imageData = ctx.createImageData(width, height);
  const data = imageData.data;
  const fn = fractalFns[document.getElementById('fractal').value];
  const colorFn = colorFns[document.getElementById('colorScheme').value];
  
  for (let py = 0; py < height; py++) {
    for (let px = 0; px < width; px++) {
      const iter = fn(px, py);
      const idx = (py * width + px) * 4;
      if (iter === -1) {
        data[idx] = data[idx+1] = data[idx+2] = 0;
      } else {
        const [r, g, b] = colorFn(iter);
        data[idx] = r; data[idx+1] = g; data[idx+2] = b;
      }
      data[idx+3] = 255;
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  centerX += (e.clientX - rect.left - width/2) / zoom;
  centerY += (e.clientY - rect.top - height/2) / zoom;
  zoom *= 2;
  document.getElementById('coords').textContent = `Center: (${centerX.toFixed(10)}, ${centerY.toFixed(10)}) Zoom: ${zoom.toFixed(0)}×`;
  render();
});

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  zoom /= 2;
  document.getElementById('coords').textContent = `Center: (${centerX.toFixed(10)}, ${centerY.toFixed(10)}) Zoom: ${zoom.toFixed(0)}×`;
  render();
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left - width/2) / zoom + centerX;
  const y = (e.clientY - rect.top - height/2) / zoom + centerY;
  document.getElementById('coords').textContent = `(${x.toFixed(10)}, ${y.toFixed(10)}) Zoom: ${zoom.toFixed(0)}×`;
});

document.getElementById('fractal').addEventListener('change', () => {
  if (document.getElementById('fractal').value === 'julia') {
    centerX = 0; centerY = 0;
  } else {
    centerX = -0.5; centerY = 0;
  }
  zoom = 200;
  render();
});
document.getElementById('colorScheme').addEventListener('change', render);
document.getElementById('maxIter').addEventListener('input', render);

function resetView() {
  centerX = document.getElementById('fractal').value === 'julia' ? 0 : -0.5;
  centerY = 0; zoom = 200;
  render();
}

function saveImage() {
  const link = document.createElement('a');
  link.download = `fractal-${Date.now()}.png`;
  link.href = canvas.toDataURL();
  link.click();
}

resize();
window.addEventListener('resize', resize);
</script>
</body>
</html>
