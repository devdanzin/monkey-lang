<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Genetic Art — Polygon Evolution</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
  h1 { text-align: center; margin-bottom: 20px; color: #e94560; }
  .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
  .canvas-box { text-align: center; }
  .canvas-box canvas { border: 2px solid #444; image-rendering: pixelated; }
  .canvas-box label { display: block; margin-top: 5px; font-size: 14px; color: #aaa; }
  .controls { text-align: center; margin: 20px 0; }
  .controls button { padding: 10px 24px; margin: 0 8px; border: none; border-radius: 6px;
    font-size: 16px; cursor: pointer; transition: 0.2s; }
  .controls button:hover { transform: scale(1.05); }
  #startBtn { background: #e94560; color: white; }
  #stopBtn { background: #444; color: white; }
  #resetBtn { background: #16213e; color: #e94560; border: 1px solid #e94560; }
  .stats { text-align: center; font-size: 14px; color: #aaa; margin: 10px 0; }
  .stats span { color: #e94560; font-weight: bold; }
  .settings { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin: 15px 0; }
  .settings label { font-size: 13px; }
  .settings input, .settings select { background: #16213e; color: #eee; border: 1px solid #444;
    border-radius: 4px; padding: 4px 8px; width: 80px; }
  #targetUpload { margin: 10px auto; display: block; }
</style>
</head>
<body>

<h1>🧬 Genetic Art — Polygon Evolution</h1>

<div class="settings">
  <label>Polygons: <input type="number" id="numPolys" value="50" min="5" max="200"></label>
  <label>Vertices: <input type="number" id="numVerts" value="3" min="3" max="8"></label>
  <label>Pop size: <input type="number" id="popSize" value="40" min="10" max="200"></label>
  <label>Mutation: <input type="number" id="mutRate" value="0.02" step="0.01" min="0.001" max="0.5"></label>
  <label>Target:
    <select id="targetSelect">
      <option value="gradient">Gradient</option>
      <option value="circles">Circles</option>
      <option value="checker">Checkerboard</option>
      <option value="custom">Upload...</option>
    </select>
  </label>
</div>
<input type="file" id="targetUpload" accept="image/*" style="display:none">

<div class="container">
  <div class="canvas-box">
    <canvas id="targetCanvas" width="128" height="128" style="width:256px;height:256px"></canvas>
    <label>Target</label>
  </div>
  <div class="canvas-box">
    <canvas id="bestCanvas" width="128" height="128" style="width:256px;height:256px"></canvas>
    <label>Best Individual</label>
  </div>
</div>

<div class="stats">
  Generation: <span id="genCount">0</span> |
  Fitness: <span id="fitnessVal">—</span> |
  Match: <span id="matchPct">0%</span> |
  Polygons: <span id="polyCount">50</span>
</div>

<div class="controls">
  <button id="startBtn">▶ Start</button>
  <button id="stopBtn">⏸ Stop</button>
  <button id="resetBtn">↺ Reset</button>
</div>

<script type="module">
  // Inline the core GA library (no bundler needed)
  // RNG
  class RNG {
    constructor(seed) {
      seed = seed ?? Date.now();
      const s = this._splitmix32(seed);
      this.s = [s(), s(), s(), s()];
    }
    _splitmix32(a) {
      return () => { a |= 0; a = (a + 0x9e3779b9) | 0;
        let t = a ^ (a >>> 16); t = Math.imul(t, 0x21f0aaad);
        t ^= t >>> 15; t = Math.imul(t, 0x735a2d97); t ^= t >>> 15; return t >>> 0; };
    }
    random() {
      const s = this.s; const result = Math.imul(s[1]*5,7)>>>0;
      const r = (result>>>0)/4294967296;
      const t = s[1]<<9; s[2]^=s[0]; s[3]^=s[1]; s[1]^=s[2]; s[0]^=s[3];
      s[2]^=t; s[3]=(s[3]<<11)|(s[3]>>>21); return r;
    }
    randInt(min,max) { return min+Math.floor(this.random()*(max-min+1)); }
    randFloat(min,max) { return min+this.random()*(max-min); }
    chance(p) { return this.random() < p; }
    gaussian() {
      let u,v,s; do { u=this.random()*2-1; v=this.random()*2-1; s=u*u+v*v; } while(s>=1||s===0);
      return u*Math.sqrt(-2*Math.log(s)/s);
    }
  }

  class Individual {
    constructor(genes, fitness=null) { this.genes=genes; this.fitness=fitness; }
    get length() { return this.genes.length; }
    clone() { return new Individual([...this.genes], this.fitness); }
    static randomReal(len,min,max,rng) {
      return new Individual(Array.from({length:len},()=>rng.randFloat(min,max)));
    }
  }

  // Decode, render, fitness (same as src/polygon-art.js)
  function decodePolygons(genes, np, nv) {
    const gp = 4 + nv*2; const polys = [];
    for (let i=0; i<np; i++) {
      const o=i*gp; const p={r:genes[o],g:genes[o+1],b:genes[o+2],a:genes[o+3],vertices:[]};
      for (let v=0; v<nv; v++) p.vertices.push([genes[o+4+v*2], genes[o+5+v*2]]);
      polys.push(p);
    } return polys;
  }

  function pointInPoly(px,py,verts) {
    let inside=false; const n=verts.length;
    for (let i=0,j=n-1;i<n;j=i++) {
      const [xi,yi]=verts[i],[xj,yj]=verts[j];
      if ((yi>py)!==(yj>py)&&px<(xj-xi)*(py-yi)/(yj-yi)+xi) inside=!inside;
    } return inside;
  }

  function renderToPixels(polys, w, h) {
    const px = new Uint8ClampedArray(w*h*4); px.fill(255);
    for (const p of polys) {
      const r=Math.round(p.r*255),g=Math.round(p.g*255),b=Math.round(p.b*255),a=p.a;
      const vs=p.vertices.map(([x,y])=>[x*w,y*h]);
      const minX=Math.max(0,Math.floor(Math.min(...vs.map(v=>v[0]))));
      const maxX=Math.min(w-1,Math.ceil(Math.max(...vs.map(v=>v[0]))));
      const minY=Math.max(0,Math.floor(Math.min(...vs.map(v=>v[1]))));
      const maxY=Math.min(h-1,Math.ceil(Math.max(...vs.map(v=>v[1]))));
      for (let y=minY;y<=maxY;y++) for (let x=minX;x<=maxX;x++) {
        if (pointInPoly(x+.5,y+.5,vs)) {
          const i=(y*w+x)*4;
          px[i]=Math.round(r*a+px[i]*(1-a));
          px[i+1]=Math.round(g*a+px[i+1]*(1-a));
          px[i+2]=Math.round(b*a+px[i+2]*(1-a));
        }
      }
    } return px;
  }

  function fitness(genes, target, np, nv, w, h) {
    const polys = decodePolygons(genes, np, nv);
    const rendered = renderToPixels(polys, w, h);
    let err = 0;
    for (let i=0; i<rendered.length; i+=4) {
      const dr=rendered[i]-target[i], dg=rendered[i+1]-target[i+1], db=rendered[i+2]-target[i+2];
      err += dr*dr + dg*dg + db*db;
    }
    return -(err / (w*h*3));
  }

  // GA
  function tournamentSelect(pop, k, rng) {
    let best=null;
    for (let i=0;i<k;i++) {
      const c=pop[rng.randInt(0,pop.length-1)];
      if (!best||c.fitness>best.fitness) best=c;
    } return best;
  }

  function blendCross(p1,p2,rng,alpha=0.3) {
    const c=[]; for (let i=0;i<p1.length;i++) {
      const lo=Math.min(p1.genes[i],p2.genes[i]),hi=Math.max(p1.genes[i],p2.genes[i]);
      const r=hi-lo; c.push(rng.randFloat(lo-alpha*r,hi+alpha*r));
    }
    return [new Individual(c.map(v=>Math.min(1,Math.max(0,v))))];
  }

  function mutate(ind, rate, rng, sigma=0.05) {
    const g=[...ind.genes];
    for (let i=0;i<g.length;i++) if (rng.chance(rate))
      g[i]=Math.min(1,Math.max(0,g[i]+rng.gaussian()*sigma));
    return new Individual(g);
  }

  // State
  let running = false, rng, population, targetPixels, generation;
  const W=128, H=128;

  function generateTarget(type) {
    const tc=document.getElementById('targetCanvas');
    const ctx=tc.getContext('2d');
    ctx.fillStyle='white'; ctx.fillRect(0,0,W,H);
    if (type==='gradient') {
      for (let x=0;x<W;x++) {
        const t=x/(W-1); ctx.fillStyle=`rgb(${Math.round(t*255)},${Math.round((1-t)*128)},${Math.round(128+t*127)})`;
        ctx.fillRect(x,0,1,H);
      }
    } else if (type==='circles') {
      ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,W,H);
      const colors=['#e94560','#0f3460','#533483','#16213e'];
      for (let i=0;i<8;i++) {
        ctx.beginPath(); ctx.arc(20+i*14,64,25-i*2,0,Math.PI*2);
        ctx.fillStyle=colors[i%4]; ctx.globalAlpha=0.7; ctx.fill();
      }
      ctx.globalAlpha=1;
    } else if (type==='checker') {
      const s=16;
      for (let y=0;y<H;y+=s) for (let x=0;x<W;x+=s) {
        ctx.fillStyle=((x/s+y/s)%2)?'#e94560':'#16213e'; ctx.fillRect(x,y,s,s);
      }
    }
    targetPixels = ctx.getImageData(0,0,W,H).data;
  }

  function reset() {
    running=false; generation=0;
    rng = new RNG(Date.now());
    const np=+document.getElementById('numPolys').value;
    const nv=+document.getElementById('numVerts').value;
    const ps=+document.getElementById('popSize').value;
    const gl=np*(4+nv*2);
    population = Array.from({length:ps},()=>Individual.randomReal(gl,0,1,rng));
    for (const ind of population) ind.fitness=fitness(ind.genes,targetPixels,np,nv,W,H);
    document.getElementById('polyCount').textContent=np;
    drawBest();
    updateStats();
  }

  function drawBest() {
    const np=+document.getElementById('numPolys').value;
    const nv=+document.getElementById('numVerts').value;
    const best=population.reduce((b,i)=>i.fitness>b.fitness?i:b);
    const polys=decodePolygons(best.genes,np,nv);
    const px=renderToPixels(polys,W,H);
    const bc=document.getElementById('bestCanvas');
    const ctx=bc.getContext('2d');
    const id=ctx.createImageData(W,H);
    id.data.set(px); ctx.putImageData(id,0,0);
  }

  function updateStats() {
    const best=population.reduce((b,i)=>i.fitness>b.fitness?i:b);
    document.getElementById('genCount').textContent=generation;
    document.getElementById('fitnessVal').textContent=best.fitness.toFixed(1);
    // Match %: MSE of 0 = 100%, worst case MSE = 255^2 = 65025
    const pct = Math.max(0, (1 + best.fitness/65025) * 100);
    document.getElementById('matchPct').textContent=pct.toFixed(1)+'%';
  }

  function evolveStep() {
    const np=+document.getElementById('numPolys').value;
    const nv=+document.getElementById('numVerts').value;
    const mr=+document.getElementById('mutRate').value;
    const sorted=[...population].sort((a,b)=>b.fitness-a.fitness);
    const newPop=[sorted[0].clone(), sorted[1].clone()]; // elitism
    while (newPop.length<population.length) {
      const p1=tournamentSelect(population,3,rng);
      const p2=tournamentSelect(population,3,rng);
      let [child] = rng.chance(0.8) ? blendCross(p1,p2,rng) : [p1.clone()];
      child = mutate(child, mr, rng);
      child.fitness = fitness(child.genes, targetPixels, np, nv, W, H);
      newPop.push(child);
    }
    population=newPop; generation++;
  }

  function loop() {
    if (!running) return;
    // Do multiple generations per frame for speed
    for (let i=0;i<5;i++) evolveStep();
    drawBest(); updateStats();
    requestAnimationFrame(loop);
  }

  // Events
  document.getElementById('startBtn').onclick=()=>{ running=true; loop(); };
  document.getElementById('stopBtn').onclick=()=>{ running=false; };
  document.getElementById('resetBtn').onclick=()=>{ generateTarget(document.getElementById('targetSelect').value); reset(); };
  document.getElementById('targetSelect').onchange=(e)=>{
    if (e.target.value==='custom') { document.getElementById('targetUpload').click(); return; }
    generateTarget(e.target.value); reset();
  };
  document.getElementById('targetUpload').onchange=(e)=>{
    const file=e.target.files[0]; if(!file) return;
    const img=new Image();
    img.onload=()=>{
      const tc=document.getElementById('targetCanvas');
      const ctx=tc.getContext('2d');
      ctx.drawImage(img,0,0,W,H);
      targetPixels=ctx.getImageData(0,0,W,H).data;
      reset();
    };
    img.src=URL.createObjectURL(file);
  };

  // Init
  generateTarget('gradient'); reset();
</script>
</body>
</html>
